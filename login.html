<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Hasnan Private</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        
        /* Animasi Latar Belakang (Disesuaikan untuk tema cerah) */
        @keyframes blob { 0% { transform: translate(0px, 0px) scale(1); } 33% { transform: translate(30px, -50px) scale(1.1); } 66% { transform: translate(-20px, 20px) scale(0.9); } 100% { transform: translate(0px, 0px) scale(1); } }
        .animate-blob { animation: blob 7s infinite; }
        .animation-delay-2000 { animation-delay: 2s; }
        
        /* Animasi Masuk */
        @keyframes fadeInUp { 0% { opacity: 0; transform: translateY(20px); } 100% { opacity: 1; transform: translateY(0); } }
        .animate-entry { animation: fadeInUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; opacity: 0; }
        
        /* Glassmorphism untuk Tema Cerah */
        .glass-card { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.5); }
    </style>
</head>

<body class="relative min-h-screen bg-slate-50 text-slate-800 flex items-center justify-center p-4 overflow-hidden">

    <!-- Latar Belakang Animasi (Warna lebih lembut untuk tema cerah) -->
    <div class="fixed top-0 left-0 w-full h-full overflow-hidden z-0 pointer-events-none">
        <div class="absolute top-1/4 left-1/4 w-96 h-96 bg-blue-200/50 rounded-full mix-blend-multiply filter blur-3xl opacity-40 animate-blob"></div>
        <div class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-indigo-200/50 rounded-full mix-blend-multiply filter blur-3xl opacity-40 animate-blob animation-delay-2000"></div>
    </div>

    <!-- Card Login -->
    <div class="animate-entry w-full max-w-sm glass-card rounded-3xl shadow-2xl shadow-slate-200 overflow-hidden relative z-10">
        
        <div class="bg-gradient-to-r from-blue-600 to-indigo-600 p-8 text-white text-center">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-white/20 border border-white/30 rounded-2xl mb-4 backdrop-blur-sm">
                <span class="material-symbols-outlined text-3xl">menu_book</span>
            </div>
            <h1 class="text-xl font-extrabold tracking-tight">Hasnan Private</h1>
            <p class="text-[10px] text-blue-100 font-bold uppercase tracking-widest mt-1">Sistem Monitoring Santri</p>
        </div>

        <div class="p-8 space-y-5">
            <div class="space-y-1.5">
                <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Username</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 text-slate-400"><span class="material-symbols-outlined text-lg">account_circle</span></span>
                    <input type="text" id="username" placeholder="Masukkan username" 
                           class="w-full pl-10 pr-4 py-3 text-sm bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all font-semibold text-slate-700 placeholder:text-slate-400 shadow-inner">
                </div>
            </div>

            <div class="space-y-1.5">
                <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Password</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 text-slate-400"><span class="material-symbols-outlined text-lg">lock</span></span>
                    <input type="password" id="password" placeholder="••••••••" 
                           class="w-full pl-10 pr-4 py-3 text-sm bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all font-semibold text-slate-700 placeholder:text-slate-400 shadow-inner">
                </div>
            </div>

            <div class="pt-2">
                <button onclick="login()" 
                        class="w-full py-3.5 px-4 bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 text-white font-bold text-sm rounded-xl shadow-lg shadow-blue-200 transition-all duration-300 active:scale-[0.98]">
                    Masuk
                </button>
            </div>

            <div class="pt-4 border-t border-slate-100 text-center">
                <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">© 2026 Hasnan Private System Pro V.1.0</p>
            </div>
        </div>
    </div>

    <script src="login.js"></script>
</body>
</html>
