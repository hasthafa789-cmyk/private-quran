<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Hasnan Private</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Font Sama dengan Dashboard -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>

<body class="bg-slate-50/50 text-slate-800 min-h-screen flex items-center justify-center p-4">

    <!-- Card Login dengan style yang sama dengan Dashboard -->
    <div class="w-full max-w-sm bg-white rounded-3xl shadow-xl border border-slate-100 overflow-hidden">
        
        <!-- Header Gradient yang sinkron dengan Dashboard -->
        <div class="bg-gradient-to-r from-blue-600 to-indigo-600 p-8 text-white text-center">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-white/10 border border-white/20 rounded-2xl mb-4 backdrop-blur-sm">
                <span class="material-symbols-outlined text-3xl">menu_book</span>
            </div>
            <h1 class="text-xl font-extrabold tracking-tight">Hasnan Private</h1>
            <p class="text-[10px] text-blue-100/80 font-bold uppercase tracking-widest mt-1">Sistem Monitoring Santri</p>
        </div>

        <div class="p-8 space-y-5">
            
            <div class="space-y-1.5">
                <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Username</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 text-slate-400">
                        <span class="material-symbols-outlined text-lg">account_circle</span>
                    </span>
                    <input type="text" id="username" placeholder="Masukkan username" 
                           class="w-full pl-10 pr-4 py-3 text-sm bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all font-semibold text-slate-700 placeholder:text-slate-400">
                </div>
            </div>

            <div class="space-y-1.5">
                <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Password</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 text-slate-400">
                        <span class="material-symbols-outlined text-lg">lock</span>
                    </span>
                    <input type="password" id="password" placeholder="••••••••" 
                           class="w-full pl-10 pr-4 py-3 text-sm bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all font-semibold text-slate-700 placeholder:text-slate-400">
                </div>
            </div>

            <div class="pt-2">
                <button onclick="login()" 
                        class="w-full py-3.5 px-4 bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 text-white font-bold text-sm rounded-xl shadow-lg shadow-blue-500/20 transition-all duration-300 active:scale-[0.98]">
                    Masuk
                </button>
            </div>

            <div class="pt-4 border-t border-slate-100 text-center">
                <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">
                    © 2026 Hasnan Private System Pro
                </p>
            </div>
        </div>
    </div>

    <!-- Script login.js harus tetap ada -->
    <script src="login.js"></script>
</body>
</html>
