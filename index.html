<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hasnan Private - Tahfidz App</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
        }
    </style>
</head>

<body class="bg-slate-50 text-slate-800 min-h-screen">

    <header class="bg-white border-b border-slate-100 sticky top-0 z-50 shadow-sm backdrop-blur-md bg-white/90">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 py-4 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
            <div>
                <h1 class="text-xl sm:text-2xl font-bold text-slate-900 flex items-center gap-2">
                    <span class="text-blue-600">📚</span> Dashboard Hafalan Qur'an
                </h1>
                <p class="text-xs sm:text-sm text-slate-500 font-medium mt-0.5">Tracking Hafalan JUZ 30 • Hasnan Private</p>
            </div>

            <div class="flex items-center gap-3 w-full sm:w-auto">
                <div class="relative flex-grow sm:flex-grow-0">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-400">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                        </svg>
                    </span>
                    <input 
                        id="namaInput" 
                        type="text"
                        placeholder="Nama Santri..."
                        oninput="setSantriAktif()"
                        class="w-full sm:w-60 pl-9 pr-4 py-2 text-sm bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all font-medium"
                    >
                </div>

                <button onclick="logout()" class="px-4 py-2 text-sm font-semibold bg-rose-50 text-rose-600 hover:bg-rose-100 active:scale-95 rounded-xl transition-all flex items-center gap-1.5 whitespace-nowrap">
                    <span>🚪</span> Logout
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 py-6 space-y-8">

        <section class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <div class="bg-white p-5 rounded-2xl border border-slate-100 shadow-sm flex items-center gap-4">
                <div class="p-3 bg-blue-50 text-blue-600 rounded-xl">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5.121 17.804A13.937 13.937 0 0112 16c2.5 0 4.847.655 6.879 1.804M15 10a3 3 0 11-6 0 3 3 0 016 0zm6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                </div>
                <div>
                    <p class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Santri Aktif</p>
                    <h2 id="namaSantri" class="text-lg font-bold text-slate-800">-</h2>
                </div>
            </div>

            <div class="bg-white p-5 rounded-2xl border border-slate-100 shadow-sm flex items-center gap-4">
                <div class="p-3 bg-sky-50 text-sky-600 rounded-xl">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z" />
                    </svg>
                </div>
                <div>
                    <p class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Total Terdaftar</p>
                    <h2 id="avgProgress" class="text-lg font-bold text-slate-800">0</h2>
                </div>
            </div>
        </section>

        <section id="sectionDashboard" class="space-y-4">
            <div class="flex items-center justify-between">
                <h3 class="text-md font-bold text-slate-700 flex items-center gap-2">
                    <span>📖</span> Silakan Pilih Surat
                </h3>
            </div>
            
            <div id="dashboardSurat" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4"></div>
        </section>

        <section id="suratDetail" class="hidden max-w-2xl mx-auto bg-white rounded-3xl shadow-md border border-slate-100 overflow-hidden transition-all duration-300">
            <div class="bg-gradient-to-r from-blue-600 to-indigo-600 p-5 text-white flex items-center justify-between">
                <button onclick="closeDetail()" class="p-2 hover:bg-white/10 rounded-xl transition active:scale-90" title="Kembali ke Dashboard">
                    <svg xmlns="http://www.w3.org/2000/xl" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
                    </svg>
                </button>
                <h2 id="judulSurat" class="text-lg font-bold text-center flex-grow">Nama Surat</h2>
                <div class="w-9"></div>
            </div>
            
            <div class="p-6 space-y-4">
                <div class="bg-slate-50 p-3 rounded-xl border border-slate-100">
                    <p class="text-[11px] text-slate-500 font-medium tracking-wide uppercase text-center">
                        💡 Ketuk nomor untuk menandai ayat yang sudah disetor (Biru)
                    </p>
                </div>

                <div id="ayatList" class="flex flex-wrap gap-2.5 justify-center"></div>
                
                <div class="pt-4 border-t border-slate-100 flex justify-end">
                    <button onclick="closeDetail()" class="px-5 py-2 text-xs font-semibold bg-slate-100 text-slate-600 hover:bg-slate-200 active:scale-95 rounded-xl transition-all flex items-center gap-1">
                        ⬅ Kembali ke Utama
                    </button>
                </div>
            </div>
        </section>

    </main>

    <script src="script.js"></script>
</body>
</html>
