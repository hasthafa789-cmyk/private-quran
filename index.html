<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Hasnan Private - Tahfidz App</title>

<link rel="stylesheet" href="style.css">

<style>
body{
    margin:0;
    font-family:Arial;
    background:#f5f7fb;
}

/* HEADER */
.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:12px;
    background:white;
    flex-wrap:wrap;
    gap:10px;
}

/* CONTAINER */
.container{
    padding:12px;
}

/* GRID SURAT */
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(140px,1fr));
    gap:10px;
}

/* CARD */
.card{
    background:white;
    padding:12px;
    border-radius:12px;
    box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

/* CARD SURAT */
.card-surat{
    background:white;
    padding:12px;
    border-radius:12px;
    box-shadow:0 2px 8px rgba(0,0,0,0.08);
    cursor:pointer;
    transition:0.2s;
}

.card-surat:hover{
    transform:scale(1.03);
}

/* AYAT GRID */
.ayat-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(45px,1fr));
    gap:6px;
    margin-top:10px;
}

/* INPUT */
input{
    padding:8px;
    border-radius:8px;
    border:1px solid #ddd;
    outline:none;
}

/* BUTTON */
button{
    padding:8px 12px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    background:#2563eb;
    color:white;
}

/* MOBILE FIX */
@media(max-width:768px){

    .grid{
        grid-template-columns:repeat(2,1fr);
    }

    .ayat-grid{
        grid-template-columns:repeat(6,1fr);
    }

    .header{
        flex-direction:column;
        align-items:flex-start;
    }
}
</style>

</head>

<body>

<!-- HEADER -->
<header class="header">

    <div>
        <h1>📚 Dashboard Hafalan Qur'an</h1>
        <p class="subtitle">Tracking Hafalan Juz 30</p>
    </div>

    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <input 
            id="namaInput" 
            placeholder="Nama Santri"
            oninput="setSantriAktif()"
        >

        <button onclick="logout()">🚪 Logout</button>
    </div>

</header>

<!-- CONTENT -->
<div class="container">

    <!-- STATS -->
    <section class="cards">

        <div class="card">
            <h3>Nama Santri Aktif</h3>
            <h2 id="namaSantri">-</h2>
        </div>

        <div class="card">
            <h3>Total Santri</h3>
            <h2 id="avgProgress">0</h2>
        </div>

    </section>

    <!-- DASHBOARD SURAT -->
    <section>
        <h3>📖 Pilih Surat</h3>
        <div id="dashboardSurat" class="grid"></div>
    </section>

    <!-- DETAIL SURAT -->
    <section id="suratDetail" style="display:none;margin-top:15px;">

        <h2 id="judulSurat"></h2>

        <div id="ayatList" class="ayat-grid"></div>

        <button onclick="closeDetail()" style="margin-top:10px;">
            ⬅ Kembali
        </button>

    </section>

</div>

<script src="script.js"></script>

</body>
</html>
